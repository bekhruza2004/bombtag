<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomb Tag</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        class GameScene extends Phaser.Scene {
            constructor() {
                super('GameScene');
                this.player1Score = 0;
                this.player2Score = 0;
                this.bombTimer = 30;
                this.bombHolder = null;
                this.gameStarted = false;
                this.bombThrown = false;
                this.player1Jumps = 0;
                this.player2Jumps = 0;
                this.player1WasGrounded = false;
                this.player2WasGrounded = false;
            }

            create() {
                this.physics.world.setBounds(0, 0, 1200, 800);

                // Create platforms
                this.platforms = this.physics.add.staticGroup();

                // Ground
                const ground = this.add.rectangle(600, 780, 1200, 40, 0x4a4a4a);
                this.physics.add.existing(ground, true);
                this.platforms.add(ground);

                // Lower platforms
                const plat1 = this.add.rectangle(200, 650, 250, 20, 0x4a4a4a);
                this.physics.add.existing(plat1, true);
                this.platforms.add(plat1);

                const plat2 = this.add.rectangle(1000, 650, 250, 20, 0x4a4a4a);
                this.physics.add.existing(plat2, true);
                this.platforms.add(plat2);

                // Mid-lower platforms
                const plat3 = this.add.rectangle(450, 520, 180, 20, 0x4a4a4a);
                this.physics.add.existing(plat3, true);
                this.platforms.add(plat3);

                const plat4 = this.add.rectangle(750, 520, 180, 20, 0x4a4a4a);
                this.physics.add.existing(plat4, true);
                this.platforms.add(plat4);

                // Middle platforms
                const plat5 = this.add.rectangle(600, 400, 200, 20, 0x4a4a4a);
                this.physics.add.existing(plat5, true);
                this.platforms.add(plat5);

                const plat6 = this.add.rectangle(150, 380, 150, 20, 0x4a4a4a);
                this.physics.add.existing(plat6, true);
                this.platforms.add(plat6);

                const plat7 = this.add.rectangle(1050, 380, 150, 20, 0x4a4a4a);
                this.physics.add.existing(plat7, true);
                this.platforms.add(plat7);

                // Upper platforms
                const plat8 = this.add.rectangle(350, 260, 160, 20, 0x4a4a4a);
                this.physics.add.existing(plat8, true);
                this.platforms.add(plat8);

                const plat9 = this.add.rectangle(850, 260, 160, 20, 0x4a4a4a);
                this.physics.add.existing(plat9, true);
                this.platforms.add(plat9);

                // Top platform
                const plat10 = this.add.rectangle(600, 150, 180, 20, 0x4a4a4a);
                this.physics.add.existing(plat10, true);
                this.platforms.add(plat10);

                // Player 1 Blue - left side
                this.player1 = this.physics.add.sprite(200, 700, null);
                const p1Graphics = this.add.graphics();
                p1Graphics.fillStyle(0x3498db, 1);
                p1Graphics.fillRect(-15, -20, 30, 40);
                p1Graphics.generateTexture('player1', 30, 40);
                p1Graphics.destroy();
                this.player1.setTexture('player1');
                this.player1.setBounce(0.1);
                this.player1.setCollideWorldBounds(true);
                this.player1.body.setSize(30, 40);

                // Player 2 Red - right side
                this.player2 = this.physics.add.sprite(1000, 700, null);
                const p2Graphics = this.add.graphics();
                p2Graphics.fillStyle(0xe74c3c, 1);
                p2Graphics.fillRect(-15, -20, 30, 40);
                p2Graphics.generateTexture('player2', 30, 40);
                p2Graphics.destroy();
                this.player2.setTexture('player2');
                this.player2.setBounce(0.1);
                this.player2.setCollideWorldBounds(true);
                this.player2.body.setSize(30, 40);
    </script>
</body>
</html>
